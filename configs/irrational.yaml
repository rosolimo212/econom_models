# Extends baseline-like settings; load programmatically or duplicate full config in app.
seed: 42
periods: 10
agents:
  citizens: 100
  factories: 10

salary:
  model: gamma
  gamma: { shape: 3, scale: 10 }

factory_init:
  capital: { dist: normal, mean: 1000, std: 300 }
  max_quality: { dist: uniform_int, min: 2, max: 30 }
  cost: { dist: uniform_int, min: 5, max: 100 }

consumer:
  rationality: 0.5
  noise:
    price_std: 0.05
    quality_std: 0.5

modernisation:
  capital_addon: { mean: -100, std: 50 }
  cost_addon: { mean: 0, std: 5 }
  quality_addon: { mean: 0, std: 3 }

pricing:
  markup: 1.0

features:
  employment: false
  bankrupt_layoffs: false
