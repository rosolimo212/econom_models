seed: 7
periods: 15
agents:
  citizens: 80
  factories: 8

salary:
  model: employment
  wage_share_of_revenue: 0.25
  unemployment_benefit: 1.0

factory_init:
  capital: { dist: normal, mean: 500, std: 150 }
  max_quality: { dist: uniform_int, min: 2, max: 20 }
  cost: { dist: uniform_int, min: 5, max: 50 }

consumer:
  rationality: 1.0
  noise: { price_std: 0.0, quality_std: 0.0 }

modernisation:
  capital_addon: { mean: -50, std: 25 }
  cost_addon: { mean: 0, std: 3 }
  quality_addon: { mean: 0, std: 2 }

pricing:
  markup: 1.0

features:
  employment: true
  bankrupt_layoffs: true
