seed: 42
periods: 30
agents:
  citizens: 2000
  factories: 50

salary:
  model: gamma
  gamma:
    shape: 3
    scale: 10
  wage_share_of_revenue: 0.3
  unemployment_benefit: 0.0

factory_init:
  capital:
    dist: normal
    mean: 1000
    std: 300
  max_quality:
    dist: uniform_int
    min: 2
    max: 30
  cost:
    dist: uniform_int
    min: 5
    max: 100

consumer:
  rationality: 1.0
  noise:
    price_std: 0.0
    quality_std: 0.0
  selection_min_quality: 0
  selection_max_price: 10000

modernisation:
  capital_addon:
    mean: -100
    std: 50
  cost_addon:
    mean: 0
    std: 5
  quality_addon:
    mean: 0
    std: 3

pricing:
  markup: 1.0

features:
  employment: false
  bankrupt_layoffs: false
